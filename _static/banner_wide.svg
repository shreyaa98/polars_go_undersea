<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="354" viewBox="0 0 1220 354" role="img" aria-labelledby="title desc">
  <title id="title">DS POLARS logo</title>
  <desc id="desc">Blue submarine icon followed by DS in black and POLARS in blue on a transparent background.</desc>
  <defs>
    <style>
      .blue{fill:#3f68c9;}
      .black{fill:#000000;}
      .word{font-family:Montserrat,Poppins,Arial,Helvetica,sans-serif;font-weight:800;letter-spacing:1.5px;}
    </style>
    <mask id="sub-cutouts">
      <rect width="100%" height="100%" fill="white"/>
      <circle cx="190" cy="178" r="19" fill="black"/>
      <circle cx="244" cy="178" r="19" fill="black"/>
      <circle cx="298" cy="178" r="19" fill="black"/>
    </mask>
  </defs>

  <!-- Transparent background: no rect/background layer -->

  <g class="blue" mask="url(#sub-cutouts)" transform="translate(47 72)">
    <!-- tail -->
    <path d="M15 105 L70 73 L70 137 L15 105 Z"/>
    <rect x="0" y="88" width="34" height="35" rx="15"/>

    <!-- body -->
    <path d="M80 53
             C120 32 205 35 273 70
             C316 92 340 126 340 165
             C340 196 315 221 280 221
             L110 221
             C63 221 32 193 32 157
             C32 110 51 69 80 53 Z"/>

    <!-- lower nose/body accent shape -->
    <path d="M48 157 C64 126 95 103 134 97 L134 221 L110 221 C63 221 32 193 32 157 Z"/>

    <!-- conning tower -->
    <path d="M129 54 L129 13 C129 3 137 -5 147 -5 L165 -5 L165 54 Z"/>
    <rect x="165" y="-5" width="27" height="33" rx="7"/>
    <rect x="119" y="54" width="109" height="42" rx="9"/>

    <!-- periscope -->
    <path d="M152 -5 L152 -31 C152 -41 160 -49 170 -49 L193 -49 C201 -49 207 -43 207 -35 C207 -27 201 -21 193 -21 L181 -21 L181 -5 Z"/>

    <!-- fins -->
    <path d="M95 49 L139 49 L119 17 C114 9 103 10 99 19 Z"/>
    <path d="M100 221 L151 221 L125 263 C120 271 108 269 105 260 Z"/>
    <path d="M286 76 L329 69 C339 68 345 79 339 87 L309 119 Z"/>
    <path d="M286 214 L329 222 C339 224 344 213 338 205 L309 174 Z"/>

    <!-- propeller -->
    <circle cx="356" cy="163" r="12"/>
    <path d="M364 163 C387 148 406 151 415 168 C397 172 380 171 364 163 Z"/>
    <path d="M354 174 C359 199 350 214 330 219 C330 199 338 184 354 174 Z"/>
    <path d="M354 152 C359 128 350 112 330 107 C330 128 338 142 354 152 Z"/>
  </g>

  <text x="426" y="209" class="word black" font-size="112">DS</text>
  <text x="600" y="209" class="word blue" font-size="112">POLARS</text>
</svg>
